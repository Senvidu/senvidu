<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
@keyframes L1{0%{transform:translate(0,0)rotate(0deg);opacity:0}8%{opacity:.93}92%{opacity:.93}100%{transform:translate(960px,110px)rotate(820deg);opacity:0}}
@keyframes L2{0%{transform:translate(0,0)rotate(25deg);opacity:0}8%{opacity:.78}92%{opacity:.78}100%{transform:translate(945px,-60px)rotate(-640deg);opacity:0}}
@keyframes L3{0%{transform:translate(0,0)rotate(-16deg);opacity:0}8%{opacity:.88}92%{opacity:.88}100%{transform:translate(955px,130px)rotate(700deg);opacity:0}}
@keyframes L4{0%{transform:translate(0,0)rotate(10deg);opacity:0}8%{opacity:.65}92%{opacity:.65}100%{transform:translate(940px,-42px)rotate(-580deg);opacity:0}}
@keyframes L5{0%{transform:translate(0,0)rotate(-25deg);opacity:0}8%{opacity:.83}92%{opacity:.83}100%{transform:translate(962px,150px)rotate(760deg);opacity:0}}
@keyframes L6{0%{transform:translate(0,0)rotate(40deg);opacity:0}8%{opacity:.72}92%{opacity:.72}100%{transform:translate(948px,58px)rotate(-700deg);opacity:0}}
@keyframes L7{0%{transform:translate(0,0)rotate(-8deg);opacity:0}8%{opacity:.9}92%{opacity:.9}100%{transform:translate(958px,28px)rotate(880deg);opacity:0}}
@keyframes L8{0%{transform:translate(0,0)rotate(18deg);opacity:0}8%{opacity:.63}92%{opacity:.63}100%{transform:translate(938px,-32px)rotate(-760deg);opacity:0}}
@keyframes L9{0%{transform:translate(0,0)rotate(-35deg);opacity:0}8%{opacity:.88}92%{opacity:.88}100%{transform:translate(960px,165px)rotate(640deg);opacity:0}}
@keyframes L10{0%{transform:translate(0,0)rotate(7deg);opacity:0}8%{opacity:.75}92%{opacity:.75}100%{transform:translate(950px,-78px)rotate(-520deg);opacity:0}}
@keyframes L11{0%{transform:translate(0,0)rotate(-20deg);opacity:0}8%{opacity:.86}92%{opacity:.86}100%{transform:translate(956px,78px)rotate(780deg);opacity:0}}
@keyframes L12{0%{transform:translate(0,0)rotate(30deg);opacity:0}8%{opacity:.7}92%{opacity:.7}100%{transform:translate(944px,-52px)rotate(-660deg);opacity:0}}
@keyframes W1{0%{transform:translateX(-950px);opacity:0}15%{opacity:.55}85%{opacity:.55}100%{transform:translateX(1900px);opacity:0}}
@keyframes W2{0%{transform:translateX(-950px);opacity:0}15%{opacity:.38}85%{opacity:.38}100%{transform:translateX(1900px);opacity:0}}
@keyframes TG{0%,100%{opacity:.94;filter:drop-shadow(0 0 12px rgba(255,252,245,.1))}50%{opacity:1;filter:drop-shadow(0 0 28px rgba(255,252,245,.25))}}
@keyframes SP{0%,100%{opacity:.8}50%{opacity:1}}
@keyframes MP{0%,100%{opacity:.08}50%{opacity:.2}}
@keyframes BL{0%,100%{opacity:1}50%{opacity:0}}
.a1{animation:L1 10s linear infinite}.a2{animation:L2 13s linear infinite 2.5s}
.a3{animation:L3 8.5s linear infinite 5s}.a4{animation:L4 15s linear infinite 1s}
.a5{animation:L5 11s linear infinite 7.5s}.a6{animation:L6 12.5s linear infinite 3.5s}
.a7{animation:L7 9.5s linear infinite 6s}.a8{animation:L8 14.5s linear infinite 0.5s}
.a9{animation:L9 10.5s linear infinite 8.5s}.a10{animation:L10 13.5s linear infinite 4s}
.a11{animation:L11 11.5s linear infinite 9s}.a12{animation:L12 12s linear infinite 2s}
.w1{animation:W1 5.5s linear infinite}.w2{animation:W1 8s linear infinite 1.8s}
.w3{animation:W2 4s linear infinite 3.2s}.w4{animation:W1 7s linear infinite 0.6s}
.w5{animation:W2 6s linear infinite 5s}.w6{animation:W1 9s linear infinite 2.2s}
.w7{animation:W2 4.5s linear infinite 6.5s}
.tt{animation:TG 5s ease-in-out infinite}
.sp{animation:SP 3.5s ease-in-out infinite}
.mp{animation:MP 6s ease-in-out infinite}
.bl{animation:BL 1.1s step-end infinite}
</style>

<!-- PURE NEUTRAL DARK GRAY — storm sky, no warm/red tint -->
<radialGradient id="BG" cx="50%" cy="40%" r="75%">
  <stop offset="0%"   stop-color="#242424"/>
  <stop offset="40%"  stop-color="#181818"/>
  <stop offset="75%"  stop-color="#0E0E0E"/>
  <stop offset="100%" stop-color="#070707"/>
</radialGradient>

<!-- Lighter storm cloud patches -->
<radialGradient id="CL1" cx="50%" cy="50%" r="50%">
  <stop offset="0%"   stop-color="#363636" stop-opacity=".9"/>
  <stop offset="100%" stop-color="#363636" stop-opacity="0"/>
</radialGradient>
<radialGradient id="CL2" cx="50%" cy="50%" r="50%">
  <stop offset="0%"   stop-color="#2C2C2C" stop-opacity=".8"/>
  <stop offset="100%" stop-color="#2C2C2C" stop-opacity="0"/>
</radialGradient>
<radialGradient id="CL3" cx="50%" cy="50%" r="50%">
  <stop offset="0%"   stop-color="#303030" stop-opacity=".7"/>
  <stop offset="100%" stop-color="#303030" stop-opacity="0"/>
</radialGradient>

<!-- Red mon glow -->
<radialGradient id="MG" cx="50%" cy="50%" r="50%">
  <stop offset="0%"   stop-color="#CC0018" stop-opacity=".25"/>
  <stop offset="65%"  stop-color="#CC0018" stop-opacity=".06"/>
  <stop offset="100%" stop-color="#CC0018" stop-opacity="0"/>
</radialGradient>

<!-- Crimson rule -->
<linearGradient id="RL" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%"   stop-color="#0E0E0E" stop-opacity="0"/>
  <stop offset="15%"  stop-color="#8B0012"/>
  <stop offset="50%"  stop-color="#CC001A"/>
  <stop offset="85%"  stop-color="#8B0012"/>
  <stop offset="100%" stop-color="#0E0E0E" stop-opacity="0"/>
</linearGradient>

<!-- Wind — silver streaks -->
<linearGradient id="WG" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%"   stop-color="#909090" stop-opacity="0"/>
  <stop offset="25%"  stop-color="#909090" stop-opacity=".5"/>
  <stop offset="75%"  stop-color="#909090" stop-opacity=".5"/>
  <stop offset="100%" stop-color="#909090" stop-opacity="0"/>
</linearGradient>
<linearGradient id="WR" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%"   stop-color="#CC001A" stop-opacity="0"/>
  <stop offset="25%"  stop-color="#CC001A" stop-opacity=".35"/>
  <stop offset="75%"  stop-color="#CC001A" stop-opacity=".35"/>
  <stop offset="100%" stop-color="#CC001A" stop-opacity="0"/>
</linearGradient>

<!-- Title glow filter -->
<filter id="TF" x="-5%" y="-40%" width="110%" height="180%">
  <feGaussianBlur stdDeviation="4" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="SF" x="-8%" y="-60%" width="116%" height="220%">
  <feGaussianBlur stdDeviation="3" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<clipPath id="C"><rect width="900" height="300"/></clipPath>
</defs>

<!-- ── STORM SKY BACKGROUND ──────────────────────────────────── -->
<rect width="900" height="300" fill="url(#BG)"/>

<!-- Storm cloud texture — lighter gray blobs like storm clouds -->
<ellipse cx="180"  cy="70"  rx="260" ry="95"  fill="url(#CL1)" opacity=".09"/>
<ellipse cx="730"  cy="190" rx="210" ry="85"  fill="url(#CL2)" opacity=".08"/>
<ellipse cx="450"  cy="35"  rx="320" ry="65"  fill="url(#CL3)" opacity=".07"/>
<ellipse cx="120"  cy="250" rx="190" ry="60"  fill="url(#CL1)" opacity=".07"/>
<ellipse cx="800"  cy="55"  rx="175" ry="55"  fill="url(#CL2)" opacity=".08"/>
<ellipse cx="600"  cy="265" rx="240" ry="55"  fill="url(#CL3)" opacity=".06"/>
<ellipse cx="320"  cy="200" rx="200" ry="70"  fill="url(#CL1)" opacity=".05"/>

<!-- ── MON CIRCLE (atmospheric crest behind title) ─────────────── -->
<circle class="mp" cx="450" cy="148" r="148" fill="url(#MG)"/>
<circle cx="450" cy="148" r="130" fill="none" stroke="#990012" stroke-width="1"   opacity=".22"/>
<circle cx="450" cy="148" r="106" fill="none" stroke="#770010" stroke-width="0.5" opacity=".12"/>
<line x1="320" y1="148" x2="580" y2="148" stroke="#880012" stroke-width="0.5" opacity=".13"/>
<line x1="450" y1="18"  x2="450" y2="278" stroke="#880012" stroke-width="0.5" opacity=".13"/>
<polygon points="450,122 464,148 450,174 436,148" fill="none" stroke="#BB0018" stroke-width="0.8" opacity=".25"/>

<!-- ── WIND STREAKS (silver — matches storm sky) ────────────────── -->
<g clip-path="url(#C)">
  <rect class="w1" x="-950" y="44"  width="460" height="0.8" fill="url(#WG)" opacity="0"/>
  <rect class="w2" x="-950" y="98"  width="560" height="0.5" fill="url(#WG)" opacity="0"/>
  <rect class="w3" x="-950" y="152" width="350" height="0.9" fill="url(#WR)" opacity="0"/>
  <rect class="w4" x="-950" y="195" width="490" height="0.4" fill="url(#WG)" opacity="0"/>
  <rect class="w5" x="-950" y="232" width="390" height="0.7" fill="url(#WR)" opacity="0"/>
  <rect class="w6" x="-950" y="72"  width="510" height="0.4" fill="url(#WG)" opacity="0"/>
  <rect class="w7" x="-950" y="265" width="340" height="0.6" fill="url(#WG)" opacity="0"/>
</g>

<!-- ── 12 CRIMSON MAPLE LEAVES ──────────────────────────────────── -->
<g clip-path="url(#C)">
  <g class="a1"  transform="translate(12,70)"  opacity="0"><path d="M0,-14L2.8,-8.5L8.5,-11L5.5,-5L11.5,-2L6.5,0L6,7.5L0,11.5L-6,7.5L-6.5,0L-11.5,-2L-5.5,-5L-8.5,-11L-2.8,-8.5Z" fill="#C80018"/><line x1="0" y1="11.5" x2="0" y2="16" stroke="#8B0010" stroke-width=".9"/></g>
  <g class="a2"  transform="translate(24,212)" opacity="0"><path d="M0,-11L2.2,-6.5L7,-8.5L4.5,-3.5L8.5,-1L4.8,.5L4.5,5.5L0,8.5L-4.5,5.5L-4.8,.5L-8.5,-1L-4.5,-3.5L-7,-8.5L-2.2,-6.5Z" fill="#E00022"/><line x1="0" y1="8.5" x2="0" y2="12" stroke="#BB0018" stroke-width=".7"/></g>
  <g class="a3"  transform="translate(7,145)"  opacity="0"><path d="M0,-16L3.2,-9.5L9.5,-12L6.5,-5.5L13,-2L7.5,0L7,8L0,12.5L-7,8L-7.5,0L-13,-2L-6.5,-5.5L-9.5,-12L-3.2,-9.5Z" fill="#A50010"/><line x1="0" y1="12.5" x2="0" y2="17.5" stroke="#7A0009" stroke-width="1"/></g>
  <g class="a4"  transform="translate(30,38)"  opacity="0"><path d="M0,-9L1.8,-5.5L5.5,-7L3.5,-2.5L7,-.5L4,.6L3.5,4.5L0,7L-3.5,4.5L-4,.6L-7,-.5L-3.5,-2.5L-5.5,-7L-1.8,-5.5Z" fill="#EE0026"/></g>
  <g class="a5"  transform="translate(10,268)" opacity="0"><path d="M0,-13L2.5,-7.5L8,-9.5L5,-4.5L10,-1.5L5.5,.5L5,6.5L0,10L-5,6.5L-5.5,.5L-10,-1.5L-5,-4.5L-8,-9.5L-2.5,-7.5Z" fill="#BB0016"/><line x1="0" y1="10" x2="0" y2="14" stroke="#990010" stroke-width=".8"/></g>
  <g class="a6"  transform="translate(20,108)" opacity="0"><path d="M0,-8.5L1.7,-5L5.5,-6.5L3.5,-2.5L6.5,0L3.5,.7L3,4.5L0,6.5L-3,4.5L-3.5,.7L-6.5,0L-3.5,-2.5L-5.5,-6.5L-1.7,-5Z" fill="#DD1825"/></g>
  <g class="a7"  transform="translate(5,22)"   opacity="0"><path d="M0,-15L3,-9L9,-11.5L6,-5L12,-2L7,.5L6.5,8L0,12L-6.5,8L-7,.5L-12,-2L-6,-5L-9,-11.5L-3,-9Z" fill="#C00020"/><line x1="0" y1="12" x2="0" y2="16.5" stroke="#AA0018" stroke-width="1"/></g>
  <g class="a8"  transform="translate(26,175)" opacity="0"><path d="M0,-7.5L1.5,-4.5L4.5,-6L3,-2L5.5,0L3,.7L2.5,3.5L0,5.5L-2.5,3.5L-3,.7L-5.5,0L-3,-2L-4.5,-6L-1.5,-4.5Z" fill="#BB1520"/></g>
  <g class="a9"  transform="translate(15,290)" opacity="0"><path d="M0,-12L2.4,-7L7.5,-9L5,-4L9.5,-1L5.5,.5L5,6L0,9.5L-5,6L-5.5,.5L-9.5,-1L-5,-4L-7.5,-9L-2.4,-7Z" fill="#AA0012"/><line x1="0" y1="9.5" x2="0" y2="13" stroke="#880010" stroke-width=".7"/></g>
  <g class="a10" transform="translate(22,60)"  opacity="0"><path d="M0,-10.5L2.1,-6.2L6.8,-8L4.2,-3.2L8,-1L4.5,.6L4,5.5L0,8L-4,5.5L-4.5,.6L-8,-1L-4.2,-3.2L-6.8,-8L-2.1,-6.2Z" fill="#DD1020"/></g>
  <g class="a11" transform="translate(8,128)"  opacity="0"><path d="M0,-13.5L2.7,-8L8.2,-10.2L5.5,-4.8L10.5,-1.8L6,.5L5.5,7L0,10.5L-5.5,7L-6,.5L-10.5,-1.8L-5.5,-4.8L-8.2,-10.2L-2.7,-8Z" fill="#990010"/><line x1="0" y1="10.5" x2="0" y2="15" stroke="#770009" stroke-width=".9"/></g>
  <g class="a12" transform="translate(18,50)"  opacity="0"><path d="M0,-8L1.6,-4.8L5,-6.2L3.3,-2.2L6.2,0L3.3,.7L3,4L0,6L-3,4L-3.3,.7L-6.2,0L-3.3,-2.2L-5,-6.2L-1.6,-4.8Z" fill="#CC1822"/></g>
</g>

<!-- ── BORDER FRAME ──────────────────────────────────────────────── -->
<rect x="16" y="12" width="868" height="276" fill="none" stroke="#6B0010" stroke-width=".9" opacity=".5"/>
<rect x="23" y="19" width="854" height="262" fill="none" stroke="#4A000B" stroke-width=".4" opacity=".25"/>
<!-- Corner L-brackets -->
<g stroke="#9B0014" stroke-width="2.2" fill="none" opacity=".7">
  <path d="M16,12L56,12M16,12L16,52"/>
  <path d="M884,12L844,12M884,12L884,52"/>
  <path d="M16,288L56,288M16,288L16,248"/>
  <path d="M884,288L844,288M884,288L884,248"/>
</g>
<!-- Red corner diamonds -->
<polygon points="16,12 21,17 16,22 11,17" fill="#CC001A" opacity=".85"/>
<polygon points="884,12 889,17 884,22 879,17" fill="#CC001A" opacity=".85"/>
<polygon points="16,288 21,283 16,278 11,283" fill="#CC001A" opacity=".85"/>
<polygon points="884,288 889,283 884,278 879,283" fill="#CC001A" opacity=".85"/>

<!-- ── TEXT ─────────────────────────────────────────────────────── -->

<!-- Eyebrow — small spaced white/gray, like "OF TSUSHIMA" upper line -->
<text x="450" y="62" text-anchor="middle"
      font-family="Georgia,'Times New Roman',serif"
      font-size="10" letter-spacing="13" fill="#C8C0B8" opacity=".72">
  GHOST  OF  THE
</text>

<!-- Top crimson rule -->
<rect x="150" y="70" width="600" height="1" fill="url(#RL)" opacity=".9"/>

<!-- MAIN TITLE — pure white, massive, like GoT "GHOST" -->
<text class="tt" x="450" y="162" text-anchor="middle"
      font-family="Georgia,'Times New Roman',serif"
      font-size="94" font-weight="bold" letter-spacing="22"
      fill="#FFFFFF" filter="url(#TF)">
  SENVIDU
</text>

<!-- Bottom crimson rule -->
<rect x="150" y="176" width="600" height="1.5" fill="url(#RL)" opacity="1"/>
<circle cx="150" cy="176.75" r="3"   fill="#CC001A" opacity=".9"/>
<circle cx="750" cy="176.75" r="3"   fill="#CC001A" opacity=".9"/>
<circle cx="450" cy="176.75" r="3.8" fill="#FFFFFF"  opacity=".7"/>

<!-- Subtitle — vivid crimson, like color accents in GoT -->
<text class="sp" x="450" y="210" text-anchor="middle"
      font-family="Georgia,'Times New Roman',serif"
      font-size="15" letter-spacing="7"
      fill="#CC001A" filter="url(#SF)">
  BACKEND  API  SPECIALIST
</text>

<!-- Diagonal katana accents -->
<line x1="82"  y1="158" x2="160" y2="170" stroke="#4A0008" stroke-width=".9" opacity=".55"/>
<line x1="740" y1="170" x2="818" y2="158" stroke="#4A0008" stroke-width=".9" opacity=".55"/>

<!-- Stack text -->
<text x="450" y="250" text-anchor="middle"
      font-family="'Courier New',Courier,monospace"
      font-size="11" letter-spacing="2" fill="#484848">
  Java · Spring Boot · Node.js · Rust · PostgreSQL · MongoDB
</text>
<text class="bl" x="692" y="250" font-family="monospace" font-size="11" fill="#880012" opacity=".7">▌</text>

<!-- Tagline -->
<text x="450" y="276" text-anchor="middle"
      font-family="Georgia,serif" font-size="10"
      font-style="italic" letter-spacing="1" fill="#333333">
  "The ghost leaves no trace. Only working systems."
</text>
</svg>
