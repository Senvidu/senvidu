<svg width="900" height="310" viewBox="0 0 900 310" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
  @keyframes ld1{0%{transform:translate(0,0) rotate(0deg);opacity:0}8%{opacity:.9}92%{opacity:.9}100%{transform:translate(970px,130px) rotate(780deg);opacity:0}}
  @keyframes ld2{0%{transform:translate(0,0) rotate(25deg);opacity:0}8%{opacity:.75}92%{opacity:.75}100%{transform:translate(950px,-70px) rotate(-600deg);opacity:0}}
  @keyframes ld3{0%{transform:translate(0,0) rotate(-12deg);opacity:0}8%{opacity:.85}92%{opacity:.85}100%{transform:translate(960px,90px) rotate(660deg);opacity:0}}
  @keyframes ld4{0%{transform:translate(0,0) rotate(8deg);opacity:0}8%{opacity:.65}92%{opacity:.65}100%{transform:translate(940px,-50px) rotate(-540deg);opacity:0}}
  @keyframes ld5{0%{transform:translate(0,0) rotate(-20deg);opacity:0}8%{opacity:.8}92%{opacity:.8}100%{transform:translate(965px,110px) rotate(720deg);opacity:0}}
  @keyframes ld6{0%{transform:translate(0,0) rotate(35deg);opacity:0}8%{opacity:.7}92%{opacity:.7}100%{transform:translate(945px,60px) rotate(-660deg);opacity:0}}
  @keyframes ld7{0%{transform:translate(0,0) rotate(-8deg);opacity:0}8%{opacity:.85}92%{opacity:.85}100%{transform:translate(955px,40px) rotate(840deg);opacity:0}}
  @keyframes ld8{0%{transform:translate(0,0) rotate(15deg);opacity:0}8%{opacity:.6}92%{opacity:.6}100%{transform:translate(935px,-30px) rotate(-720deg);opacity:0}}
  @keyframes ld9{0%{transform:translate(0,0) rotate(-30deg);opacity:0}8%{opacity:.9}92%{opacity:.9}100%{transform:translate(958px,150px) rotate(600deg);opacity:0}}
  @keyframes ld10{0%{transform:translate(0,0) rotate(5deg);opacity:0}8%{opacity:.7}92%{opacity:.7}100%{transform:translate(948px,-80px) rotate(-480deg);opacity:0}}

  @keyframes windLine{0%{transform:translateX(-920px);opacity:0}12%{opacity:.5}88%{opacity:.5}100%{transform:translateX(1840px);opacity:0}}
  @keyframes windFast{0%{transform:translateX(-920px);opacity:0}10%{opacity:.4}90%{opacity:.4}100%{transform:translateX(1840px);opacity:0}}

  @keyframes titleGlow{0%,100%{opacity:.92;filter:drop-shadow(0 0 10px rgba(235,225,205,.15))}50%{opacity:1;filter:drop-shadow(0 0 24px rgba(235,225,205,.3))}}
  @keyframes subGlow{0%,100%{opacity:.8}50%{opacity:1}}
  @keyframes monPulse{0%,100%{opacity:.12}50%{opacity:.28}}
  @keyframes monRing{0%,100%{opacity:.22}50%{opacity:.45}}
  @keyframes cursorBlink{0%,100%{opacity:1}50%{opacity:0}}
  @keyframes grainFlicker{0%,100%{opacity:.03}33%{opacity:.05}66%{opacity:.04}}

  .l1{animation:ld1 10s linear infinite}
  .l2{animation:ld2 13s linear infinite 2.5s}
  .l3{animation:ld3 8.5s linear infinite 5s}
  .l4{animation:ld4 15s linear infinite 1s}
  .l5{animation:ld5 11s linear infinite 7s}
  .l6{animation:ld6 12s linear infinite 3.5s}
  .l7{animation:ld7 9s linear infinite 6s}
  .l8{animation:ld8 14s linear infinite 0.5s}
  .l9{animation:ld9 10.5s linear infinite 8s}
  .l10{animation:ld10 13.5s linear infinite 4s}

  .w1{animation:windLine 5.5s linear infinite}
  .w2{animation:windLine 8s linear infinite 1.8s}
  .w3{animation:windFast 4s linear infinite 3.2s}
  .w4{animation:windLine 7s linear infinite 0.6s}
  .w5{animation:windFast 6s linear infinite 5s}
  .w6{animation:windLine 9s linear infinite 2s}
  .w7{animation:windFast 4.5s linear infinite 6.5s}

  .title{animation:titleGlow 5s ease-in-out infinite}
  .sub{animation:subGlow 3.5s ease-in-out infinite}
  .monFill{animation:monPulse 6s ease-in-out infinite}
  .monRing{animation:monRing 4s ease-in-out infinite}
  .cur{animation:cursorBlink 1.1s step-end infinite}
</style>

<!-- Background gradient: deep near-black with warm undertone -->
<radialGradient id="bg" cx="48%" cy="38%" r="72%">
  <stop offset="0%" stop-color="#180808"/>
  <stop offset="45%" stop-color="#0E0505"/>
  <stop offset="100%" stop-color="#040202"/>
</radialGradient>

<!-- Atmospheric glow behind title -->
<radialGradient id="titleAtmo" cx="50%" cy="50%" r="50%">
  <stop offset="0%" stop-color="#7A0010" stop-opacity="0.18"/>
  <stop offset="100%" stop-color="#7A0010" stop-opacity="0"/>
</radialGradient>

<!-- Mon (crest) radial -->
<radialGradient id="monFill" cx="50%" cy="50%" r="50%">
  <stop offset="0%" stop-color="#8B0018" stop-opacity="0.3"/>
  <stop offset="100%" stop-color="#8B0018" stop-opacity="0"/>
</radialGradient>

<!-- Rule gradient -->
<linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%"   stop-color="#040202"/>
  <stop offset="18%"  stop-color="#7A0010"/>
  <stop offset="50%"  stop-color="#BC0020"/>
  <stop offset="82%"  stop-color="#7A0010"/>
  <stop offset="100%" stop-color="#040202"/>
</linearGradient>

<!-- Left fade for wind lines -->
<linearGradient id="windFade" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%"   stop-color="#9B0010" stop-opacity="0"/>
  <stop offset="20%"  stop-color="#9B0010" stop-opacity="0.5"/>
  <stop offset="80%"  stop-color="#9B0010" stop-opacity="0.5"/>
  <stop offset="100%" stop-color="#9B0010" stop-opacity="0"/>
</linearGradient>

<linearGradient id="windFade2" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%"   stop-color="#555" stop-opacity="0"/>
  <stop offset="20%"  stop-color="#555" stop-opacity="0.35"/>
  <stop offset="80%"  stop-color="#555" stop-opacity="0.35"/>
  <stop offset="100%" stop-color="#555" stop-opacity="0"/>
</linearGradient>

<!-- Title glow filter -->
<filter id="titleF" x="-5%" y="-30%" width="110%" height="160%">
  <feGaussianBlur stdDeviation="4" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="redF" x="-10%" y="-50%" width="120%" height="200%">
  <feGaussianBlur stdDeviation="2.5" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>

<clipPath id="clip"><rect width="900" height="310"/></clipPath>
</defs>

<!-- ── BACKGROUND ─────────────────────────────────────── -->
<rect width="900" height="310" fill="url(#bg)"/>

<!-- Atmospheric bloom behind title area -->
<ellipse cx="450" cy="148" rx="380" ry="140" fill="url(#titleAtmo)" opacity="0.6"/>

<!-- ── MON CIRCLE (family crest, atmospheric) ─────────── -->
<!-- Outer atmospheric glow -->
<circle class="monFill" cx="450" cy="148" r="155" fill="url(#monFill)"/>
<!-- Ring 1 -->
<circle class="monRing" cx="450" cy="148" r="138" fill="none" stroke="#8B0018" stroke-width="1" opacity="0.35"/>
<!-- Ring 2 -->
<circle class="monRing" cx="450" cy="148" r="118" fill="none" stroke="#8B0018" stroke-width="0.5" opacity="0.2" style="animation-delay:1s"/>
<!-- Compass lines of mon -->
<g opacity="0.18">
  <line x1="312" y1="148" x2="588" y2="148" stroke="#8B0018" stroke-width="0.7"/>
  <line x1="450" y1="10"  x2="450" y2="286" stroke="#8B0018" stroke-width="0.7"/>
</g>
<!-- Inner diamond of mon -->
<polygon points="450,118 468,148 450,178 432,148" fill="none" stroke="#8B0018" stroke-width="0.8" opacity="0.25"/>

<!-- ── WIND STREAKS ─────────────────────────────────────── -->
<g clip-path="url(#clip)">
  <rect class="w1" x="-920" y="46"  width="400" height="0.7" fill="url(#windFade)" opacity="0"/>
  <rect class="w2" x="-920" y="98"  width="560" height="0.5" fill="url(#windFade2)" opacity="0"/>
  <rect class="w3" x="-920" y="155" width="320" height="0.8" fill="url(#windFade)" opacity="0"/>
  <rect class="w4" x="-920" y="195" width="480" height="0.4" fill="url(#windFade2)" opacity="0"/>
  <rect class="w5" x="-920" y="230" width="380" height="0.6" fill="url(#windFade)" opacity="0"/>
  <rect class="w6" x="-920" y="72"  width="500" height="0.4" fill="url(#windFade2)" opacity="0"/>
  <rect class="w7" x="-920" y="265" width="340" height="0.7" fill="url(#windFade)" opacity="0"/>
</g>

<!-- ── MAPLE LEAVES ─────────────────────────────────────── -->
<!-- 5-pointed maple leaf shape, crimson variants -->
<g clip-path="url(#clip)">
  <!-- leaf 1: large, blood crimson -->
  <g class="l1" transform="translate(12,75)">
    <path d="M0,-13 L2.5,-8 L7,-10 L5,-5 L10,-2 L5.5,0 L5,6 L0,10 L-5,6 L-5.5,0 L-10,-2 L-5,-5 L-7,-10 L-2.5,-8 Z" fill="#8B0010" opacity="0.95"/>
    <line x1="0" y1="10" x2="0" y2="14" stroke="#6A000C" stroke-width="0.8"/>
  </g>
  <!-- leaf 2: medium, vivid crimson -->
  <g class="l2" transform="translate(22,210)">
    <path d="M0,-10 L2,-6 L6,-8 L4,-3 L8,0 L4.5,1 L4,5 L0,8 L-4,5 L-4.5,1 L-8,0 L-4,-3 L-6,-8 L-2,-6 Z" fill="#CC1020" opacity="0.9"/>
    <line x1="0" y1="8" x2="0" y2="12" stroke="#AA0018" stroke-width="0.7"/>
  </g>
  <!-- leaf 3: large, dark red -->
  <g class="l3" transform="translate(7,145)">
    <path d="M0,-15 L3,-9 L8,-11 L6,-5 L12,-2 L6.5,0 L6,7 L0,11 L-6,7 L-6.5,0 L-12,-2 L-6,-5 L-8,-11 L-3,-9 Z" fill="#7A000C" opacity="0.92"/>
    <line x1="0" y1="11" x2="0" y2="16" stroke="#5A0009" stroke-width="0.9"/>
  </g>
  <!-- leaf 4: small, bright -->
  <g class="l4" transform="translate(28,38)">
    <path d="M0,-9 L1.8,-5 L5,-7 L3.5,-2.5 L7,0 L3.8,0.8 L3.5,4.5 L0,7 L-3.5,4.5 L-3.8,0.8 L-7,0 L-3.5,-2.5 L-5,-7 L-1.8,-5 Z" fill="#9B1015" opacity="0.85"/>
  </g>
  <!-- leaf 5: medium, vivid -->
  <g class="l5" transform="translate(10,268)">
    <path d="M0,-12 L2.2,-7 L7,-9 L5,-4 L9,-1 L5,0.5 L4.5,6 L0,9 L-4.5,6 L-5,0.5 L-9,-1 L-5,-4 L-7,-9 L-2.2,-7 Z" fill="#A81018" opacity="0.88"/>
    <line x1="0" y1="9" x2="0" y2="13" stroke="#880012" stroke-width="0.7"/>
  </g>
  <!-- leaf 6: small, dark -->
  <g class="l6" transform="translate(18,108)">
    <path d="M0,-8 L1.5,-5 L5,-6 L3.5,-2 L6,0 L3.2,0.7 L3,4 L0,6 L-3,4 L-3.2,0.7 L-6,0 L-3.5,-2 L-5,-6 L-1.5,-5 Z" fill="#CC2025" opacity="0.9"/>
  </g>
  <!-- leaf 7: large, falling from high -->
  <g class="l7" transform="translate(5,20)">
    <path d="M0,-14 L2.8,-8.5 L8,-10.5 L5.5,-5 L11,-2 L6,0 L5.5,7 L0,10.5 L-5.5,7 L-6,0 L-11,-2 L-5.5,-5 L-8,-10.5 L-2.8,-8.5 Z" fill="#8B0018" opacity="0.93"/>
    <line x1="0" y1="10.5" x2="0" y2="15" stroke="#6A0012" stroke-width="1"/>
  </g>
  <!-- leaf 8: tiny, accent -->
  <g class="l8" transform="translate(25,175)">
    <path d="M0,-7 L1.4,-4 L4,-5.5 L2.8,-2 L5.5,0 L3,0.6 L2.5,3.5 L0,5.5 L-2.5,3.5 L-3,0.6 L-5.5,0 L-2.8,-2 L-4,-5.5 L-1.4,-4 Z" fill="#B01520" opacity="0.8"/>
  </g>
  <!-- leaf 9: medium-large -->
  <g class="l9" transform="translate(14,290)">
    <path d="M0,-11 L2,-6.5 L6.5,-8.5 L4.5,-3.5 L8.5,-1 L4.8,0.5 L4.5,5.5 L0,8.5 L-4.5,5.5 L-4.8,0.5 L-8.5,-1 L-4.5,-3.5 L-6.5,-8.5 L-2,-6.5 Z" fill="#9B0015" opacity="0.87"/>
    <line x1="0" y1="8.5" x2="0" y2="12" stroke="#7A000F" stroke-width="0.7"/>
  </g>
  <!-- leaf 10: medium -->
  <g class="l10" transform="translate(20,60)">
    <path d="M0,-10 L2,-6 L6,-7.5 L4,-3 L7.5,0 L4,0.8 L3.8,5 L0,7.5 L-3.8,5 L-4,0.8 L-7.5,0 L-4,-3 L-6,-7.5 L-2,-6 Z" fill="#CC1825" opacity="0.82"/>
  </g>
</g>

<!-- ── BORDER FRAME ─────────────────────────────────────── -->
<!-- Outer border -->
<rect x="18" y="14" width="864" height="282" fill="none" stroke="#8B0010" stroke-width="0.6" opacity="0.3"/>
<!-- Inner border -->
<rect x="26" y="22" width="848" height="266" fill="none" stroke="#8B0010" stroke-width="0.3" opacity="0.15"/>

<!-- Corner ornaments -->
<g stroke="#8B0018" stroke-width="1.5" fill="none" opacity="0.55">
  <path d="M18,14 L50,14 M18,14 L18,46"/>
  <path d="M882,14 L850,14 M882,14 L882,46"/>
  <path d="M18,296 L50,296 M18,296 L18,264"/>
  <path d="M882,296 L850,296 M882,296 L882,264"/>
</g>
<!-- Corner diamonds -->
<rect x="15" y="11" width="6" height="6" transform="rotate(45 18 14)" fill="#8B0018" opacity="0.7"/>
<rect x="879" y="11" width="6" height="6" transform="rotate(45 882 14)" fill="#8B0018" opacity="0.7"/>
<rect x="15" y="293" width="6" height="6" transform="rotate(45 18 296)" fill="#8B0018" opacity="0.7"/>
<rect x="879" y="293" width="6" height="6" transform="rotate(45 882 296)" fill="#8B0018" opacity="0.7"/>

<!-- ── TOP EYEBROW TEXT ─────────────────────────────────── -->
<text x="450" y="62" text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="10" letter-spacing="10" fill="#7A0010" opacity="0.85">
  GHOST  OF  THE
</text>

<!-- ── TOP CRIMSON RULE ────────────────────────────────── -->
<rect x="160" y="70" width="580" height="1" fill="url(#rule)" opacity="0.9"/>

<!-- ── MAIN TITLE: SENVIDU ────────────────────────────── -->
<text class="title" x="450" y="158" text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="82" font-weight="bold" letter-spacing="22"
      fill="#EDEAE3" filter="url(#titleF)">
  SENVIDU
</text>

<!-- ── BOTTOM CRIMSON RULE ────────────────────────────── -->
<rect x="160" y="172" width="580" height="1.5" fill="url(#rule)" opacity="1"/>

<!-- Dot accents on rule -->
<circle cx="160" cy="172.75" r="2.5" fill="#BC0020" opacity="0.9"/>
<circle cx="740" cy="172.75" r="2.5" fill="#BC0020" opacity="0.9"/>
<circle cx="450" cy="172.75" r="3.5" fill="#EDEAE3" opacity="0.7"/>

<!-- ── SUBTITLE: BACKEND ───────────────────────────────── -->
<text class="sub" x="450" y="205" text-anchor="middle"
      font-family="Georgia, serif" font-size="16"
      letter-spacing="6" fill="#9B0018" filter="url(#redF)">
  BACKEND  API  SPECIALIST
</text>

<!-- ── KATANA ACCENT LINES ────────────────────────────── -->
<line x1="90" y1="155" x2="170" y2="168" stroke="#6A0010" stroke-width="0.8" opacity="0.45"/>
<line x1="730" y1="168" x2="810" y2="155" stroke="#6A0010" stroke-width="0.8" opacity="0.45"/>

<!-- ── STACK LINE ──────────────────────────────────────── -->
<text x="450" y="248" text-anchor="middle"
      font-family="'Courier New', Courier, monospace"
      font-size="11" letter-spacing="1.8" fill="#4A3030">
  Java · Spring Boot · Node.js · Rust · PostgreSQL · MongoDB
</text>

<!-- ── BLINKING CURSOR ─────────────────────────────────── -->
<text class="cur" x="686" y="248" font-family="monospace" font-size="12" fill="#7A0010" opacity="0.7">▌</text>

<!-- ── BOTTOM TAGLINE ──────────────────────────────────── -->
<text x="450" y="276" text-anchor="middle"
      font-family="Georgia, serif" font-size="10.5"
      font-style="italic" letter-spacing="1" fill="#3A2020" opacity="0.9">
  "The ghost leaves no trace. Only working systems."
</text>
</svg>
