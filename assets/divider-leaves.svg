<svg width="900" height="36" viewBox="0 0 900 36" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
  @keyframes ld1{0%{transform:translate(0,0) rotate(0deg);opacity:0}8%{opacity:.85}92%{opacity:.85}100%{transform:translate(920px,14px) rotate(720deg);opacity:0}}
  @keyframes ld2{0%{transform:translate(0,0) rotate(20deg);opacity:0}8%{opacity:.7}92%{opacity:.7}100%{transform:translate(910px,-10px) rotate(-540deg);opacity:0}}
  @keyframes ld3{0%{transform:translate(0,0) rotate(-10deg);opacity:0}8%{opacity:.8}92%{opacity:.8}100%{transform:translate(915px,18px) rotate(600deg);opacity:0}}
  @keyframes ld4{0%{transform:translate(0,0) rotate(35deg);opacity:0}8%{opacity:.65}92%{opacity:.65}100%{transform:translate(905px,-6px) rotate(-660deg);opacity:0}}
  @keyframes ld5{0%{transform:translate(0,0) rotate(-25deg);opacity:0}8%{opacity:.9}92%{opacity:.9}100%{transform:translate(918px,20px) rotate(780deg);opacity:0}}
  @keyframes ld6{0%{transform:translate(0,0) rotate(12deg);opacity:0}8%{opacity:.75}92%{opacity:.75}100%{transform:translate(908px,8px) rotate(-600deg);opacity:0}}
  @keyframes lineBreath{0%,100%{opacity:.3}50%{opacity:.55}}
  .l1{animation:ld1 11s linear infinite}
  .l2{animation:ld2 14s linear infinite 3s}
  .l3{animation:ld3 9s linear infinite 6s}
  .l4{animation:ld4 13s linear infinite 1s}
  .l5{animation:ld5 10s linear infinite 8s}
  .l6{animation:ld6 12s linear infinite 4.5s}
  .lb{animation:lineBreath 4s ease-in-out infinite}
</style>
<linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%"   stop-color="#040202"/>
  <stop offset="18%"  stop-color="#7A0010" stop-opacity="0.5"/>
  <stop offset="50%"  stop-color="#8B0018" stop-opacity="0.7"/>
  <stop offset="82%"  stop-color="#7A0010" stop-opacity="0.5"/>
  <stop offset="100%" stop-color="#040202"/>
</linearGradient>
</defs>
<rect width="900" height="36" fill="none"/>
<!-- Base line -->
<line class="lb" x1="0" y1="18" x2="900" y2="18" stroke="url(#lg)" stroke-width="0.8"/>
<!-- Static leaf accents at ends -->
<g transform="translate(35,18)" opacity="0.3">
  <path d="M0,-8 L1.5,-5 L5,-6 L3.5,-2 L6,0 L3,0 L2.5,4 L0,6 L-2.5,4 L-3,0 L-6,0 L-3.5,-2 L-5,-6 L-1.5,-5 Z" fill="#BC0020"/>
</g>
<g transform="translate(865,18)" opacity="0.3">
  <path d="M0,-8 L1.5,-5 L5,-6 L3.5,-2 L6,0 L3,0 L2.5,4 L0,6 L-2.5,4 L-3,0 L-6,0 L-3.5,-2 L-5,-6 L-1.5,-5 Z" fill="#BC0020"/>
</g>
<!-- Flying leaves -->
<g clip-path="none">
  <g class="l1" transform="translate(10,16)" opacity="0">
    <path d="M0,-10 L2,-6 L6,-8 L4,-3 L8,0 L4,0.5 L3.5,5 L0,8 L-3.5,5 L-4,0.5 L-8,0 L-4,-3 L-6,-8 L-2,-6 Z" fill="#8B0010"/>
    <line x1="0" y1="8" x2="0" y2="11" stroke="#6A000C" stroke-width="0.7"/>
  </g>
  <g class="l2" transform="translate(22,24)" opacity="0">
    <path d="M0,-7 L1.5,-4 L4.5,-5.5 L3,-1.5 L5.5,0 L3,0.5 L2.5,3.5 L0,5.5 L-2.5,3.5 L-3,0.5 L-5.5,0 L-3,-1.5 L-4.5,-5.5 L-1.5,-4 Z" fill="#CC1020"/>
  </g>
  <g class="l3" transform="translate(8,10)" opacity="0">
    <path d="M0,-11 L2,-7 L7,-8.5 L5,-3.5 L8.5,-1 L5,0 L4.5,5.5 L0,8.5 L-4.5,5.5 L-5,0 L-8.5,-1 L-5,-3.5 L-7,-8.5 L-2,-7 Z" fill="#7A000C"/>
    <line x1="0" y1="8.5" x2="0" y2="12" stroke="#5A0009" stroke-width="0.8"/>
  </g>
  <g class="l4" transform="translate(18,28)" opacity="0">
    <path d="M0,-8 L1.5,-5 L5,-6 L3.5,-2 L6,0 L3,0.5 L2.5,4 L0,6 L-2.5,4 L-3,0.5 L-6,0 L-3.5,-2 L-5,-6 L-1.5,-5 Z" fill="#A81018"/>
  </g>
  <g class="l5" transform="translate(5,6)" opacity="0">
    <path d="M0,-9 L1.8,-5.5 L5.5,-7 L4,-2.5 L7.5,-0.5 L4,0.5 L3.5,5 L0,7.5 L-3.5,5 L-4,0.5 L-7.5,-0.5 L-4,-2.5 L-5.5,-7 L-1.8,-5.5 Z" fill="#9B0018"/>
    <line x1="0" y1="7.5" x2="0" y2="11" stroke="#7A0012" stroke-width="0.7"/>
  </g>
  <g class="l6" transform="translate(14,20)" opacity="0">
    <path d="M0,-7 L1.3,-4 L4.5,-5.5 L3,-1.5 L5.5,0 L2.8,0.6 L2.5,3.5 L0,5 L-2.5,3.5 L-2.8,0.6 L-5.5,0 L-3,-1.5 L-4.5,-5.5 L-1.3,-4 Z" fill="#BC1520"/>
  </g>
</g>
</svg>
